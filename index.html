window.onerror = function(msg, src) {
  if (!src || src === '?' || src === 'about:blank') return true;
  return false;
};
window.addEventListener('unhandledrejection', function(e) {
  // Suppress Supabase/Alpine internal promise rejections in sandboxed preview
  if (!e.reason?.stack || e.reason?.stack?.includes('alpinejs') || e.reason?.stack?.includes('supabase')) {
    e.preventDefault();
  }
});

<script>
// ============================================================
// BulbaWiki — API Layer (PostgREST fetch — sem Supabase SDK)
// ============================================================

const SUPABASE_URL      = 'https://qyvsrbewliqplnmljxck.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF5dnNyYmV3bGlxcGxubWxqeGNrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxODY1MzcsImV4cCI6MjA4OTc2MjUzN30.VEKGHrEKE762PuObbkeanTl_okis_X2SAEtGE4JFbso'

const _cache = {}
const _HEADERS = { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Accept': 'application/json' }

async function _pgFetch(path) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, { headers: _HEADERS })
  if (!res.ok) { console.warn('[BwAPI]', path, res.status); return [] }
  return res.json()
}

// Fetch all rows with automatic pagination (1000/page)
async function _all(table, select = '*', order = 'id') {
  if (_cache[table]) return _cache[table]
  const PAGE = 1000
  let rows = [], offset = 0, done = false
  while (!done) {
    const qs = `select=${encodeURIComponent(select)}&order=${order}&limit=${PAGE}&offset=${offset}`
    const page = await _pgFetch(`${table}?${qs}`)
    rows = rows.concat(page)
    done = page.length < PAGE
    offset += PAGE
  }
  _cache[table] = rows
  return rows
}

const BwAPI = {

  // ── Pokémon ──────────────────────────────────────────────
  async loadPokemon() {
    return _all('pokemon', '*', 'id')
  },

  async loadPokemonMoves(pokemonId) {
    const key = `pm_${pokemonId}`
    if (_cache[key]) return _cache[key]
    const data = await _pgFetch(`pokemon_moves?select=*&pokemon_id=eq.${pokemonId}&order=level.asc.nullslast`)
    _cache[key] = data
    return data
  },

  // ── Items ─────────────────────────────────────────────────
  async loadItemCategories() {
    return _all('item_categories', '*', 'name')
  },

  async loadItems() {
    if (_cache['_items_full']) return _cache['_items_full']
    const [items, categories, crafting, berries] = await Promise.all([
      _all('items', '*', 'id'),
      BwAPI.loadItemCategories(),
      _all('item_crafting', 'item_id', 'item_id'),
      _all('berry_details', 'item_id', 'item_id'),
    ])
    const catMap   = Object.fromEntries(categories.map(c => [c.id, c.name]))
    const craftSet = new Set(crafting.map(c => c.item_id))
    const berrySet = new Set(berries.map(b => b.item_id))
    const result   = items.map(item => ({
      ...item,
      category_name: catMap[item.category_id] ?? null,
      is_craftable:  craftSet.has(item.id),
      is_berry:      berrySet.has(item.id),
    }))
    _cache['_items_full'] = result
    return result
  },

  async loadItemCrafting(itemId) {
    const key = `craft_${itemId}`
    if (_cache[key] !== undefined) return _cache[key]
    // Fetch crafting record + nested slots + slot options
    const recs = await _pgFetch(
      `item_crafting?select=*,crafting_slots(*,crafting_slot_options(*))&item_id=eq.${itemId}`
    )
    const rec = recs?.[0] ?? null
    if (rec?.crafting_slots) rec.crafting_slots.sort((a, b) => a.slot_order - b.slot_order)
    _cache[key] = rec
    return rec
  },

  async loadBerryDetails(itemId) {
    const key = `berry_${itemId}`
    if (_cache[key] !== undefined) return _cache[key]
    const recs = await _pgFetch(`berry_details?select=*&item_id=eq.${itemId}&limit=1`)
    _cache[key] = recs?.[0] ?? null
    return _cache[key]
  },

  getItemById(id) {
    return (_cache['_items_full'] ?? []).find(i => i.id == id) ?? null
  },

  getCategoryById(id) {
    return (_cache['item_categories'] ?? []).find(c => c.id == id) ?? null
  },

  // ── Moves ─────────────────────────────────────────────────
  async loadMoves() {
    return _all('moves', '*', 'name')
  },

  async loadMoveLearnedBy(moveName) {
    const key = `mlb_${encodeURIComponent(moveName)}`
    if (_cache[key]) return _cache[key]
    const data = await _pgFetch(
      `pokemon_moves?select=*,pokemon(id,name)&move_name=eq.${encodeURIComponent(moveName)}&order=pokemon_id`
    )
    _cache[key] = data
    return data
  },

  // ── Abilities ─────────────────────────────────────────────
  async loadAbilities() {
    return _all('abilities', '*', 'name')
  },
}

</script>
<script>
// ============================================================
// BulbaWiki — Alpine.js App Component
// ============================================================

const TYPE_COLORS = {
  normal:   { bg: '#f0f0e8', text: '#5a5a3a', border: '#d0d0b0' },
  fire:     { bg: '#fdf0e8', text: '#8a3a10', border: '#f0c0a0' },
  water:    { bg: '#e8f0fd', text: '#1a3a8a', border: '#a0c0f0' },
  electric: { bg: '#fff8d0', text: '#7a6a10', border: '#e8d880' },
  grass:    { bg: '#e8f5e0', text: '#3a6a20', border: '#c0e0a0' },
  ice:      { bg: '#e8f8fd', text: '#1a6a7a', border: '#a0e0f0' },
  fighting: { bg: '#fde8e8', text: '#8a1a1a', border: '#f0a0a0' },
  poison:   { bg: '#f0e8f5', text: '#6a2a7a', border: '#d0b0e0' },
  ground:   { bg: '#f5f0e0', text: '#6a5a1a', border: '#e0d0a0' },
  flying:   { bg: '#eaf0fd', text: '#2a4a8a', border: '#b0c8f0' },
  psychic:  { bg: '#fde8f0', text: '#8a1a4a', border: '#f0a0c0' },
  bug:      { bg: '#eef5e0', text: '#3a5a10', border: '#b8d890' },
  rock:     { bg: '#f0ede0', text: '#5a4a20', border: '#d0c890' },
  ghost:    { bg: '#ece8f5', text: '#3a1a5a', border: '#c0a8e0' },
  dragon:   { bg: '#e8e8fd', text: '#1a1a8a', border: '#a0a0f0' },
  dark:     { bg: '#ece8f0', text: '#2a1a3a', border: '#b8a8d0' },
  steel:    { bg: '#eeeef5', text: '#3a3a5a', border: '#c0c0d8' },
  fairy:    { bg: '#fde8f5', text: '#8a1a6a', border: '#f0a0d8' },
}

const STATUS_LABELS = {
  canonical: 'Padrão',
  modified:  'Modificado para o RPG',
  original:  'Original do RPG',
}
const STATUS_COLORS = {
  canonical: { bg: '#e8f5e0', text: '#3a6a20' },
  modified:  { bg: '#fff8d0', text: '#7a6a10' },
  original:  { bg: '#f0e8f5', text: '#6a2a7a' },
}
const CATEGORY_LABELS = { physical: 'Físico', special: 'Especial', status: 'Status' }
const METHOD_LABELS   = { 'level-up': 'Por Nível', 'machine': 'Por MT' }
const STAT_META = [
  { key: 'hp',        label: 'HP',      color: '#4caf50' },
  { key: 'attack',    label: 'ATK',     color: '#f44336' },
  { key: 'defense',   label: 'DEF',     color: '#ff9800' },
  { key: 'sp_attack', label: 'SP.ATK',  color: '#2196f3' },
  { key: 'sp_defense',label: 'SP.DEF',  color: '#00bcd4' },
  { key: 'speed',     label: 'VEL',     color: '#e91e8c' },
]
const PER_PAGE = 12

function bulbaWiki() {
  return {

    // ── Tabs ────────────────────────────────────────────────
    activeTab: 'pokemon',
    tabs: [
      { id: 'pokemon',   label: 'Pokémon' },
      { id: 'items',     label: 'Itens' },
      { id: 'moves',     label: 'Moves' },
      { id: 'abilities', label: 'Habilidades' },
    ],

    // ── Data stores ─────────────────────────────────────────
    stores: {
      pokemon:   { data: [], filtered: [], page: 1, loaded: false, loading: false },
      items:     { data: [], filtered: [], page: 1, loaded: false, loading: false },
      moves:     { data: [], filtered: [], page: 1, loaded: false, loading: false },
      abilities: { data: [], filtered: [], page: 1, loaded: false, loading: false },
    },

    // ── Filters ─────────────────────────────────────────────
    fPokemon:   { search: '', type1: '', type2: '', eggGroup: '', canBreed: false, hasArtwork: false },
    fItems:     { search: '', category: '', hasSprite: false, hasPrice: false, isCraftable: false, isBerry: false, priceMin: 0, priceMax: 100000 },
    fMoves:     { search: '', type: '', category: '', status: '', hasContest: false, hasOutEffect: false, powerMin: 0, powerMax: 250 },
    fAbilities: { search: '', status: '', hasOutEffect: false },

    // ── Filter option lists ──────────────────────────────────
    allTypes:       Object.keys(TYPE_COLORS),
    allEggGroups:   [],
    allCategories:  [], // item_categories

    // ── Modal ────────────────────────────────────────────────
    modal: { open: false, type: null, data: null, extra: null, loading: false },
    modalHistory: [],
    activeArtwork: 'normal',
    carouselIdx: 0,
    copiedUrl: false,
    filtersOpen: false,
    filterModalOpen: false,

    // ── Init ─────────────────────────────────────────────────
    async init() {
      await this.switchTab('pokemon')
      this._handleHash()
      window.addEventListener('hashchange', () => this._handleHash())
    },

    // ── Tab loading ──────────────────────────────────────────
    async switchTab(tab) {
      this.activeTab = tab
      this.filtersOpen = false
      const s = this.stores[tab]
      if (s.loaded) return
      s.loading = true
      try {
        if (tab === 'pokemon') {
          s.data = await BwAPI.loadPokemon()
          this.allEggGroups = [...new Set(
            s.data.flatMap(p => [p.egg_group1, p.egg_group2]).filter(Boolean)
          )].sort()
        } else if (tab === 'items') {
          s.data = await BwAPI.loadItems()
          this.allCategories = await BwAPI.loadItemCategories()
        } else if (tab === 'moves') {
          s.data = await BwAPI.loadMoves()
        } else if (tab === 'abilities') {
          s.data = await BwAPI.loadAbilities()
        }
        s.loaded = true
        this.applyFilters(tab)
      } catch (e) {
        console.error('[BwWiki] loadTab', e)
      } finally {
        s.loading = false
      }
    },

    // ── Filters ──────────────────────────────────────────────
    applyFilters(tab) {
      const s = this.stores[tab]
      let d = s.data

      if (tab === 'pokemon') {
        const f = this.fPokemon, q = f.search.toLowerCase().trim()
        d = d.filter(p =>
          (!q || p.name.toLowerCase().includes(q)) &&
          (!f.type1 || p.type1?.toLowerCase() === f.type1) &&
          (!f.type2 || p.type2?.toLowerCase() === f.type2) &&
          (!f.eggGroup || p.egg_group1 === f.eggGroup || p.egg_group2 === f.eggGroup) &&
          (!f.canBreed || p.can_breed) &&
          (!f.hasArtwork || p.artwork_normal)
        )
      } else if (tab === 'items') {
        const f = this.fItems, q = f.search.toLowerCase().trim()
        d = d.filter(i =>
          (!q || i.name.toLowerCase().includes(q)) &&
          (!f.category || String(i.category_id) === f.category) &&
          (!f.hasSprite  || (i.sprites?.length > 0)) &&
          (!f.hasPrice   || i.price != null) &&
          (!f.isCraftable|| i.is_craftable) &&
          (!f.isBerry    || i.is_berry) &&
          (i.price == null || (i.price >= f.priceMin && i.price <= f.priceMax))
        )
      } else if (tab === 'moves') {
        const f = this.fMoves, q = f.search.toLowerCase().trim()
        d = d.filter(m =>
          (!q || m.name.toLowerCase().includes(q)) &&
          (!f.type     || m.type?.toLowerCase() === f.type) &&
          (!f.category || m.category === f.category) &&
          (!f.status   || m.status === f.status) &&
          (!f.hasContest   || m.contest_points) &&
          (!f.hasOutEffect || m.out_of_battle_effect) &&
          (m.power == null || (m.power >= f.powerMin && m.power <= f.powerMax))
        )
      } else if (tab === 'abilities') {
        const f = this.fAbilities, q = f.search.toLowerCase().trim()
        d = d.filter(a =>
          (!q || a.name.toLowerCase().includes(q)) &&
          (!f.status      || a.status === f.status) &&
          (!f.hasOutEffect|| a.out_of_battle_effect)
        )
      }

      s.filtered = d
      s.page = 1
    },

    clearFilters(tab) {
      if (tab === 'pokemon')   this.fPokemon   = { search:'', type1:'', type2:'', eggGroup:'', canBreed:false, hasArtwork:false }
      if (tab === 'items')     this.fItems     = { search:'', category:'', hasSprite:false, hasPrice:false, isCraftable:false, isBerry:false, priceMin:0, priceMax:100000 }
      if (tab === 'moves')     this.fMoves     = { search:'', type:'', category:'', status:'', hasContest:false, hasOutEffect:false, powerMin:0, powerMax:250 }
      if (tab === 'abilities') this.fAbilities = { search:'', status:'', hasOutEffect:false }
      this.applyFilters(tab)
    },

    get activeFiltersCount() {
      const tab = this.activeTab
      if (tab === 'pokemon') {
        const f = this.fPokemon
        return [f.search,f.type1,f.type2,f.eggGroup,f.canBreed,f.hasArtwork].filter(Boolean).length
      }
      if (tab === 'items') {
        const f = this.fItems
        return [f.search,f.category,f.hasSprite,f.hasPrice,f.isCraftable,f.isBerry].filter(Boolean).length
      }
      if (tab === 'moves') {
        const f = this.fMoves
        return [f.search,f.type,f.category,f.status,f.hasContest,f.hasOutEffect].filter(Boolean).length
      }
      if (tab === 'abilities') {
        const f = this.fAbilities
        return [f.search,f.status,f.hasOutEffect].filter(Boolean).length
      }
      return 0
    },

    // ── Pagination ───────────────────────────────────────────
    get curStore() { return this.stores[this.activeTab] },

    get pagedItems() {
      const s = this.curStore
      const start = (s.page - 1) * PER_PAGE
      return s.filtered.slice(start, start + PER_PAGE)
    },

    get totalPages() {
      return Math.max(1, Math.ceil(this.curStore.filtered.length / PER_PAGE))
    },

    get paginationPages() {
      const total = this.totalPages, cur = this.curStore.page
      if (total <= 7) return Array.from({ length: total }, (_, i) => i + 1)
      const set = new Set([1, 2, cur - 1, cur, cur + 1, total - 1, total].filter(p => p >= 1 && p <= total))
      const sorted = [...set].sort((a, b) => a - b)
      const pages = []
      for (let i = 0; i < sorted.length; i++) {
        if (i > 0 && sorted[i] - sorted[i - 1] > 1) pages.push('…')
        pages.push(sorted[i])
      }
      return pages
    },

    goToPage(p) {
      if (p < 1 || p > this.totalPages) return
      this.curStore.page = p
    },

    jumpPage(e) {
      const v = parseInt(e.target.value)
      e.target.value = ''
      if (!isNaN(v)) this.goToPage(v)
    },

    // ── Modal open/close ─────────────────────────────────────
    async openModal(type, data, push = true) {
      if (push && this.modal.open) {
        this.modalHistory.push({ type: this.modal.type, data: this.modal.data })
      }
      this.activeArtwork = 'normal'
      this.carouselIdx   = 0
      this.modal = { open: true, type, data, extra: null, loading: true }
      window.location.hash = `${type}-${data.id}`

      try {
        if (type === 'pokemon') {
          const moves = await BwAPI.loadPokemonMoves(data.id)
          this.modal.extra = { moves }
        } else if (type === 'item') {
          const [crafting, berry] = await Promise.all([
            data.is_craftable ? BwAPI.loadItemCrafting(data.id) : null,
            data.is_berry     ? BwAPI.loadBerryDetails(data.id) : null,
          ])
          this.modal.extra = { crafting, berry }
        } else if (type === 'move') {
          const learnedBy = await BwAPI.loadMoveLearnedBy(data.name)
          this.modal.extra = { learnedBy }
        } else {
          this.modal.extra = {}
        }
      } catch (e) {
        console.error('[BwWiki] openModal extra', e)
        this.modal.extra = {}
      } finally {
        this.modal.loading = false
      }
    },

    closeModal() {
      this.modal = { open: false, type: null, data: null, extra: null, loading: false }
      this.modalHistory = []
      history.pushState('', document.title, window.location.pathname + window.location.search)
    },

    goBack() {
      const prev = this.modalHistory.pop()
      if (prev) this.openModal(prev.type, prev.data, false)
      else this.closeModal()
    },

    // ── Cross-modal navigation ───────────────────────────────
    async openMoveByName(name) {
      if (!this.stores.moves.loaded) await this.switchTab('moves')
      const m = this.stores.moves.data.find(x => x.name === name)
      if (m) this.openModal('move', m)
    },

    async openPokemonById(id) {
      if (!this.stores.pokemon.loaded) await this.switchTab('pokemon')
      const p = this.stores.pokemon.data.find(x => x.id == id)
      if (p) this.openModal('pokemon', p)
    },

    async openItemById(id) {
      if (!this.stores.items.loaded) await this.switchTab('items')
      const i = this.stores.items.data.find(x => x.id == id)
      if (i) this.openModal('item', i)
    },

    async copyUrl() {
      await navigator.clipboard.writeText(window.location.href)
      this.copiedUrl = true
      setTimeout(() => { this.copiedUrl = false }, 1500)
    },

    async _handleHash() {
      const hash = window.location.hash.slice(1)
      if (!hash) return
      const dash = hash.lastIndexOf('-')
      if (dash < 0) return
      const type  = hash.slice(0, dash)
      const id    = parseInt(hash.slice(dash + 1))
      if (isNaN(id)) return
      const tabMap = { pokemon: 'pokemon', item: 'items', move: 'moves', ability: 'abilities' }
      const tab = tabMap[type]
      if (!tab) return
      await this.switchTab(tab)
      const item = this.stores[tab].data.find(d => d.id == id)
      if (item) {
        this.activeTab = tab
        this.openModal(type, item, false)
      }
    },

    // ── Formatting helpers ───────────────────────────────────
    typeBadgeStyle(type) {
      const c = TYPE_COLORS[type?.toLowerCase()] || { bg: '#eee', text: '#555', border: '#ccc' }
      return `background:${c.bg};color:${c.text};border-color:${c.border}`
    },
    typeHex(type) {
      const map = {
        normal:'#a8a878',fire:'#f08030',water:'#6890f0',electric:'#f8d030',
        grass:'#78c850',ice:'#98d8d8',fighting:'#c03028',poison:'#a040a0',
        ground:'#e0c068',flying:'#a890f0',psychic:'#f85888',bug:'#a8b820',
        rock:'#b8a038',ghost:'#705898',dragon:'#7038f8',dark:'#705848',
        steel:'#b8b8d0',fairy:'#ee99ac'
      }
      return map[type?.toLowerCase()] || '#aaa'
    },
    statusBadgeStyle(status) {
      const c = STATUS_COLORS[status] || STATUS_COLORS.canonical
      return `background:${c.bg};color:${c.text}`
    },
    statusLabel(s) { return STATUS_LABELS[s] || s },
    catLabel(c)    { return CATEGORY_LABELS[c] || c },
    methodLabel(m) { return METHOD_LABELS[m] || m },

    fmtPrice(p) {
      if (p == null) return null
      return '₽\u202f' + p.toLocaleString('pt-BR')
    },
    fmtHeight(cm) {
      if (cm == null) return null
      return (cm / 100).toFixed(1).replace('.', ',') + ' m'
    },
    fmtWeight(hg) {
      if (hg == null) return null
      return (hg / 10).toFixed(1).replace('.', ',') + ' kg'
    },
    fmtGender(male, female) {
      if (male == null && female == null) return 'Sem gênero'
      return `♂ ${male}% / ♀ ${female}%`
    },
    pokemonId(id) {
      return '#' + String(id).padStart(4, '0')
    },

    statRows(p) {
      if (!p) return []
      return STAT_META.map(s => ({ ...s, val: p[s.key] ?? 0 }))
    },
    statTotal(p) {
      if (!p) return 0
      return STAT_META.reduce((sum, s) => sum + (p[s.key] ?? 0), 0)
    },
    statBarPct(val) {
      return Math.min(100, Math.round((val / 255) * 100)) + '%'
    },

    artworkUrl(p) {
      if (!p) return null
      if (this.activeArtwork === 'shadow' && p.artwork_shadow) return p.artwork_shadow
      if (this.activeArtwork === 'aura'   && p.artwork_aura)   return p.artwork_aura
      return p.artwork_normal
    },

    groupedMoves(moves) {
      const order = ['level-up', 'machine']
      const map = {}
      for (const m of moves) {
        const k = m.learn_method || 'other'
        if (!map[k]) map[k] = []
        map[k].push(m)
      }
      if (map['level-up']) map['level-up'].sort((a, b) => (a.level ?? 999) - (b.level ?? 999))
      // Return in preferred order, then remaining
      const keys = [...new Set([...order, ...Object.keys(map)])]
      return keys.filter(k => map[k]).map(k => ({ method: k, moves: map[k] }))
    },

    itemSprites(item) {
      if (!item?.sprites) return []
      return Array.isArray(item.sprites) ? item.sprites.filter(Boolean) : []
    },

    slotOptionLabel(opt) {
      if (opt.item_id) {
        const item = BwAPI.getItemById(opt.item_id)
        return { text: item?.name ?? `Item #${opt.item_id}`, itemId: opt.item_id }
      }
      if (opt.category_id) {
        const cat = BwAPI.getCategoryById(opt.category_id)
        return { text: `Qualquer item de: ${cat?.name ?? `Cat. #${opt.category_id}`}`, itemId: null }
      }
      if (opt.tag) {
        return { text: `Qualquer ${opt.tag_type || 'tag'}: ${opt.tag}`, itemId: null }
      }
      return { text: '—', itemId: null }
    },

    berryFlavors(berry) {
      if (!berry) return []
      return [
        { label: 'Beauty',  val: berry.flavor_beauty  ?? 0 },
        { label: 'Clever',  val: berry.flavor_clever  ?? 0 },
        { label: 'Cool',    val: berry.flavor_cool    ?? 0 },
        { label: 'Cute',    val: berry.flavor_cute    ?? 0 },
        { label: 'Tough',   val: berry.flavor_tough   ?? 0 },
      ]
    },
  }
}

<body>
<div id="bulbawiki" x-data="bulbaWiki()" x-init="init()">

  <!-- ── TÍTULO ──────────────────────────────────────────── -->
  <div class="bw-title">
    <div class="bw-title-dot"></div>
    <span class="bw-title-text">BulbaWiki</span>
  </div>

  <!-- ── TABS ────────────────────────────────────────────── -->
  <nav class="bw-tabs">
    <template x-for="tab in tabs" :key="tab.id">
      <button class="bw-tab"
        :class="{ active: activeTab === tab.id }"
        @click="switchTab(tab.id)"
        x-text="tab.label">
      </button>
    </template>
  </nav>

  <!-- ══════════════════════════════════════════════════════
       FILTERS
  ══════════════════════════════════════════════════════════ -->

  <!-- Botão filtros -->
  <button class="bw-filter-toggle" :class="{ 'has-filters': activeFiltersCount > 0 }" @click="filtersOpen = !filtersOpen">
    <span>⚙ Filtros</span>
    <template x-if="activeFiltersCount > 0">
      <span class="bw-filter-badge" x-text="activeFiltersCount"></span>
    </template>
    <span class="bw-filter-arrow" :class="{ open: filtersOpen }">▼</span>
  </button>

  <!-- Pokémon filters -->
  <div class="bw-filters" x-show="activeTab === 'pokemon' && filtersOpen">
    <div class="bw-fg">
      <span class="bw-fl">Nome</span>
      <input class="bw-input" type="search" placeholder="Buscar…"
        x-model="fPokemon.search" @input="applyFilters('pokemon')">
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Tipo 1</span>
      <select class="bw-select" x-model="fPokemon.type1" @change="applyFilters('pokemon')">
        <option value="">Todos</option>
        <template x-for="t in allTypes" :key="t">
          <option :value="t" x-text="t.charAt(0).toUpperCase()+t.slice(1)"></option>
        </template>
      </select>
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Tipo 2</span>
      <select class="bw-select" x-model="fPokemon.type2" @change="applyFilters('pokemon')">
        <option value="">Todos</option>
        <template x-for="t in allTypes" :key="t">
          <option :value="t" x-text="t.charAt(0).toUpperCase()+t.slice(1)"></option>
        </template>
      </select>
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Grupo de Ovo</span>
      <select class="bw-select" x-model="fPokemon.eggGroup" @change="applyFilters('pokemon')">
        <option value="">Todos</option>
        <template x-for="g in allEggGroups" :key="g">
          <option :value="g" x-text="g"></option>
        </template>
      </select>
    </div>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fPokemon.canBreed" @change="applyFilters('pokemon')">
      Pode cruzar
    </label>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fPokemon.hasArtwork" @change="applyFilters('pokemon')">
      Tem artwork
    </label>
    <button class="bw-btn-clear" x-show="activeFiltersCount > 0"
      @click="clearFilters('pokemon')">Limpar filtros</button>
  </div>

  <!-- Items filters -->
  <div class="bw-filters" x-show="activeTab === 'items' && filtersOpen">
    <div class="bw-fg">
      <span class="bw-fl">Nome</span>
      <input class="bw-input" type="search" placeholder="Buscar…"
        x-model="fItems.search" @input="applyFilters('items')">
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Categoria</span>
      <select class="bw-select" x-model="fItems.category" @change="applyFilters('items')">
        <option value="">Todas</option>
        <template x-for="cat in allCategories" :key="cat.id">
          <option :value="String(cat.id)" x-text="cat.name"></option>
        </template>
      </select>
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Preço mín (₽)</span>
      <div class="bw-range-wrap">
        <input class="bw-range" type="range" min="0" max="100000" step="500"
          x-model.number="fItems.priceMin" @input="applyFilters('items')">
        <span class="bw-range-val" x-text="fItems.priceMin.toLocaleString('pt-BR')"></span>
      </div>
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Preço máx (₽)</span>
      <div class="bw-range-wrap">
        <input class="bw-range" type="range" min="0" max="100000" step="500"
          x-model.number="fItems.priceMax" @input="applyFilters('items')">
        <span class="bw-range-val" x-text="fItems.priceMax >= 100000 ? '100.000+' : fItems.priceMax.toLocaleString('pt-BR')"></span>
      </div>
    </div>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fItems.hasSprite" @change="applyFilters('items')">
      Tem sprite
    </label>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fItems.hasPrice" @change="applyFilters('items')">
      Tem preço
    </label>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fItems.isCraftable" @change="applyFilters('items')">
      É craftável
    </label>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fItems.isBerry" @change="applyFilters('items')">
      É berry
    </label>
    <button class="bw-btn-clear" x-show="activeFiltersCount > 0"
      @click="clearFilters('items')">Limpar filtros</button>
  </div>

  <!-- Moves filters -->
  <div class="bw-filters" x-show="activeTab === 'moves' && filtersOpen">
    <div class="bw-fg">
      <span class="bw-fl">Nome</span>
      <input class="bw-input" type="search" placeholder="Buscar…"
        x-model="fMoves.search" @input="applyFilters('moves')">
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Tipo</span>
      <select class="bw-select" x-model="fMoves.type" @change="applyFilters('moves')">
        <option value="">Todos</option>
        <template x-for="t in allTypes" :key="t">
          <option :value="t" x-text="t.charAt(0).toUpperCase()+t.slice(1)"></option>
        </template>
      </select>
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Categoria</span>
      <select class="bw-select" x-model="fMoves.category" @change="applyFilters('moves')">
        <option value="">Todas</option>
        <option value="physical">Físico</option>
        <option value="special">Especial</option>
        <option value="status">Status</option>
      </select>
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Status</span>
      <select class="bw-select" x-model="fMoves.status" @change="applyFilters('moves')">
        <option value="">Todos</option>
        <option value="canonical">Padrão</option>
        <option value="modified">Modificado</option>
        <option value="original">Original</option>
      </select>
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Poder mín</span>
      <div class="bw-range-wrap">
        <input class="bw-range" type="range" min="0" max="250" step="5"
          x-model.number="fMoves.powerMin" @input="applyFilters('moves')">
        <span class="bw-range-val" x-text="fMoves.powerMin"></span>
      </div>
    </div>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fMoves.hasContest" @change="applyFilters('moves')">
      Contest points
    </label>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fMoves.hasOutEffect" @change="applyFilters('moves')">
      Efeito fora de batalha
    </label>
    <button class="bw-btn-clear" x-show="activeFiltersCount > 0"
      @click="clearFilters('moves')">Limpar filtros</button>
  </div>

  <!-- Abilities filters -->
  <div class="bw-filters" x-show="activeTab === 'abilities' && filtersOpen">
    <div class="bw-fg">
      <span class="bw-fl">Nome</span>
      <input class="bw-input" type="search" placeholder="Buscar…"
        x-model="fAbilities.search" @input="applyFilters('abilities')">
    </div>
    <div class="bw-fg">
      <span class="bw-fl">Status</span>
      <select class="bw-select" x-model="fAbilities.status" @change="applyFilters('abilities')">
        <option value="">Todos</option>
        <option value="canonical">Padrão</option>
        <option value="modified">Modificado</option>
        <option value="original">Original</option>
      </select>
    </div>
    <label class="bw-toggle">
      <input type="checkbox" x-model="fAbilities.hasOutEffect" @change="applyFilters('abilities')">
      Com efeito fora de batalha
    </label>
    <button class="bw-btn-clear" x-show="activeFiltersCount > 0"
      @click="clearFilters('abilities')">Limpar filtros</button>
  </div>

  <!-- ── RESULTS BAR ──────────────────────────────────────── -->
  <div class="bw-bar">
    <span x-text="`${curStore.filtered.length} resultado${curStore.filtered.length !== 1 ? 's' : ''}`"></span>
    <span x-show="totalPages > 1" x-text="`Página ${curStore.page} de ${totalPages}`"></span>
  </div>

  <!-- ══════════════════════════════════════════════════════
       GRIDS
  ══════════════════════════════════════════════════════════ -->

  <!-- Pokémon grid -->
  <div class="bw-grid-pokemon" x-show="activeTab === 'pokemon'">
    <template x-if="curStore.loading">
      <div class="bw-state"><div class="bw-spinner"></div>Carregando Pokémon…</div>
    </template>
    <template x-if="!curStore.loading && curStore.filtered.length === 0">
      <div class="bw-state">Nenhum Pokémon encontrado.</div>
    </template>
    <template x-for="p in pagedItems" :key="p.id">
      <div class="bw-pcard" @click="openModal('pokemon', p)">
        <div class="bw-pcard-img">
          <template x-if="p.artwork_normal">
            <img :src="p.artwork_normal" :alt="p.name" loading="lazy">
          </template>
          <template x-if="!p.artwork_normal">
            <div class="bw-pcard-ph">◈</div>
          </template>
        </div>
        <div class="bw-pcard-body">
          <div class="bw-pcard-num" x-text="pokemonId(p.id)"></div>
          <div class="bw-pcard-name" x-text="p.name"></div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            <span class="bw-badge" :style="typeBadgeStyle(p.type1)" x-text="p.type1"></span>
            <template x-if="p.type2">
              <span class="bw-badge" :style="typeBadgeStyle(p.type2)" x-text="p.type2"></span>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Items grid -->
  <div class="bw-grid-wide" x-show="activeTab === 'items'">
    <template x-if="curStore.loading">
      <div class="bw-state"><div class="bw-spinner"></div>Carregando itens…</div>
    </template>
    <template x-if="!curStore.loading && curStore.filtered.length === 0">
      <div class="bw-state">Nenhum item encontrado.</div>
    </template>
    <template x-for="item in pagedItems" :key="item.id">
      <div class="bw-icard" @click="openModal('item', item)">
        <div class="bw-icard-img">
          <template x-if="itemSprites(item).length > 0">
            <img :src="itemSprites(item)[0]" :alt="item.name" loading="lazy">
          </template>
          <template x-if="itemSprites(item).length === 0">
            <div class="bw-icard-img-ph">◈</div>
          </template>
        </div>
        <div class="bw-icard-body">
          <div class="bw-icard-name" x-text="item.name"></div>
          <div class="bw-icard-cat" x-text="item.category_name || '—'"></div>
          <template x-if="item.price != null">
            <div class="bw-icard-price" x-text="fmtPrice(item.price)"></div>
          </template>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:2px">
            <template x-if="item.is_craftable">
              <span class="bw-badge-status" style="background:#e8f5e0;color:#3a6a20;font-size:10px;padding:1px 6px">Craftável</span>
            </template>
            <template x-if="item.is_berry">
              <span class="bw-badge-status" style="background:#fff8d0;color:#7a6a10;font-size:10px;padding:1px 6px">Berry</span>
            </template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Moves grid -->
  <div class="bw-grid-wide" x-show="activeTab === 'moves'">
    <template x-if="curStore.loading">
      <div class="bw-state"><div class="bw-spinner"></div>Carregando moves…</div>
    </template>
    <template x-if="!curStore.loading && curStore.filtered.length === 0">
      <div class="bw-state">Nenhum move encontrado.</div>
    </template>
    <template x-for="m in pagedItems" :key="m.id">
      <div class="bw-mcard"
        :style="`background:var(--row);--mcard-color:${typeHex(m.type)}`"
        @click="openModal('move', m)">
        <div class="bw-mcard-stripe" :style="`background:${typeHex(m.type)}`"></div>
        <div class="bw-mcard-top">
          <div class="bw-mcard-name" x-text="m.name"></div>
          <div class="bw-mcard-badges">
            <template x-if="m.type">
              <span class="bw-badge" :style="typeBadgeStyle(m.type)" x-text="m.type"></span>
            </template>
          </div>
        </div>
        <div class="bw-mcard-badges" style="padding-left:8px">
          <template x-if="m.category">
            <span class="bw-badge-status" style="background:var(--forums)" x-text="catLabel(m.category)"></span>
          </template>
          <template x-if="m.status">
            <span class="bw-badge-status" :style="statusBadgeStyle(m.status)" x-text="statusLabel(m.status)"></span>
          </template>
        </div>
        <template x-if="m.description">
          <div class="bw-mcard-desc" x-text="m.description"></div>
        </template>
      </div>
    </template>
  </div>

  <!-- Abilities grid -->
  <div class="bw-grid-wide" x-show="activeTab === 'abilities'">
    <template x-if="curStore.loading">
      <div class="bw-state"><div class="bw-spinner"></div>Carregando habilidades…</div>
    </template>
    <template x-if="!curStore.loading && curStore.filtered.length === 0">
      <div class="bw-state">Nenhuma habilidade encontrada.</div>
    </template>
    <template x-for="a in pagedItems" :key="a.id">
      <div class="bw-lcard" @click="openModal('ability', a)">
        <div class="bw-lcard-top">
          <div class="bw-lcard-name" x-text="a.name"></div>
          <template x-if="a.status">
            <span class="bw-badge-status" :style="statusBadgeStyle(a.status)" x-text="statusLabel(a.status)"></span>
          </template>
        </div>
        <template x-if="a.description">
          <div class="bw-lcard-desc" x-text="a.description"></div>
        </template>
      </div>
    </template>
  </div>

  <!-- ── PAGINATION ───────────────────────────────────────── -->
  <div class="bw-pager" x-show="totalPages > 1">
    <button class="bw-pager-btn" :disabled="curStore.page <= 1" @click="goToPage(curStore.page - 1)">‹</button>

    <template x-for="(p, i) in paginationPages" :key="i">
      <template x-if="p === '…'">
        <div class="bw-pager-ellipsis">…</div>
      </template>
      <template x-if="p !== '…'">
        <button class="bw-pager-btn" :class="{ active: curStore.page === p }"
          @click="goToPage(p)" x-text="p"></button>
      </template>
    </template>

    <template x-if="totalPages > 7">
      <input class="bw-pager-input" type="number" min="1" :max="totalPages"
        placeholder="ir…" @keydown.enter="jumpPage($event)" title="Ir para página">
    </template>

    <button class="bw-pager-btn" :disabled="curStore.page >= totalPages" @click="goToPage(curStore.page + 1)">›</button>
  </div>

  <!-- ══════════════════════════════════════════════════════
       MODAL OVERLAY
  ══════════════════════════════════════════════════════════ -->
  <div class="bw-overlay" x-show="modal.open" x-cloak
    @click.self="closeModal()"
    @keydown.escape.window="closeModal()">

    <div class="bw-modal" x-show="modal.open" x-transition>

      <!-- Modal header (common) -->
      <div class="bw-mhead" x-show="modal.data">
        <div class="bw-mhead-left">
          <div class="bw-mhead-title" x-text="modal.data?.name"></div>

          <!-- Pokémon sub: id + classification -->
          <template x-if="modal.type === 'pokemon'">
            <div class="bw-mhead-sub" x-text="pokemonId(modal.data?.id) + (modal.data?.classification ? ' · ' + modal.data?.classification : '')"></div>
          </template>
          <!-- Item sub: category -->
          <template x-if="modal.type === 'item' && modal.data?.category_name">
            <div class="bw-mhead-sub" x-text="modal.data?.category_name"></div>
          </template>

          <!-- Type badges row -->
          <div class="bw-mhead-badges">
            <template x-if="modal.type === 'pokemon'">
              <span x-show="modal.data?.type1" class="bw-badge" :style="typeBadgeStyle(modal.data?.type1)" x-text="modal.data?.type1"></span>
            </template>
            <template x-if="modal.type === 'pokemon' && modal.data?.type2">
              <span class="bw-badge" :style="typeBadgeStyle(modal.data?.type2)" x-text="modal.data?.type2"></span>
            </template>
            <template x-if="modal.type === 'move' && modal.data?.type">
              <span class="bw-badge" :style="typeBadgeStyle(modal.data?.type)" x-text="modal.data?.type"></span>
            </template>
            <template x-if="modal.type === 'move' && modal.data?.category">
              <span class="bw-badge-status" style="background:var(--row)" x-text="catLabel(modal.data?.category)"></span>
            </template>
            <template x-if="(modal.type === 'move' || modal.type === 'ability') && modal.data?.status">
              <span class="bw-badge-status" :style="statusBadgeStyle(modal.data?.status)" x-text="statusLabel(modal.data?.status)"></span>
            </template>
          </div>
        </div>

        <!-- Action buttons -->
        <div class="bw-mbtns">
          <button class="bw-mbtn" :class="{ copied: copiedUrl }" @click="copyUrl()"
            :title="copiedUrl ? 'URL copiada!' : 'Copiar link'">
            <span x-text="copiedUrl ? '✓' : '🔗'"></span>
          </button>
          <template x-if="modalHistory.length > 0">
            <button class="bw-mbtn" @click="goBack()" title="Voltar">←</button>
          </template>
          <button class="bw-mbtn" @click="closeModal()" title="Fechar">✕</button>
        </div>
      </div>

      <!-- Loading state -->
      <div class="bw-mloading" x-show="modal.loading">
        <div class="bw-spinner"></div>
      </div>

      <!-- ── POKEMON MODAL BODY ────────────────────────────── -->
      <template x-if="modal.type === 'pokemon' && !modal.loading && modal.data">
      <div class="bw-mbody">

        <!-- Artwork -->
        <div class="bw-artwork">
          <template x-if="artworkUrl(modal.data)">
            <img :src="artworkUrl(modal.data)" :alt="modal.data?.name">
          </template>
          <template x-if="!artworkUrl(modal.data)">
            <div class="bw-artwork-ph">◈</div>
          </template>
          <!-- Artwork toggle -->
          <div class="bw-artwork-tog"
            x-show="modal.data?.artwork_shadow || modal.data?.artwork_aura">
            <button class="bw-atbtn" :class="{ active: activeArtwork==='normal' }"
              @click="activeArtwork='normal'">Normal</button>
            <template x-if="modal.data?.artwork_shadow">
              <button class="bw-atbtn" :class="{ active: activeArtwork==='shadow' }"
                @click="activeArtwork='shadow'">Sombra</button>
            </template>
            <template x-if="modal.data?.artwork_aura">
              <button class="bw-atbtn" :class="{ active: activeArtwork==='aura' }"
                @click="activeArtwork='aura'">Aura</button>
            </template>
          </div>
        </div>

        <!-- Info grid -->
        <div class="bw-msect">
          <div class="bw-msect-title">Informações</div>
          <div class="bw-igrid">
            <template x-if="fmtHeight(modal.data?.height)">
              <div class="bw-irow">
                <span class="bw-ikey">Altura</span>
                <span class="bw-ival" x-text="fmtHeight(modal.data?.height)"></span>
              </div>
            </template>
            <template x-if="fmtWeight(modal.data?.weight)">
              <div class="bw-irow">
                <span class="bw-ikey">Peso</span>
                <span class="bw-ival" x-text="fmtWeight(modal.data?.weight)"></span>
              </div>
            </template>
            <div class="bw-irow">
              <span class="bw-ikey">Gênero</span>
              <span class="bw-ival" x-text="fmtGender(modal.data?.gender_male, modal.data?.gender_female)"></span>
            </div>
            <template x-if="modal.data?.egg_group1">
              <div class="bw-irow">
                <span class="bw-ikey">Grupo de Ovo</span>
                <span class="bw-ival" x-text="[modal.data?.egg_group1, modal.data?.egg_group2].filter(Boolean).join(', ')"></span>
              </div>
            </template>
            <div class="bw-irow">
              <span class="bw-ikey">Pode cruzar</span>
              <span class="bw-ival" x-text="modal.data?.can_breed ? 'Sim' : 'Não'"></span>
            </div>
            <template x-if="modal.data?.base_exp != null">
              <div class="bw-irow">
                <span class="bw-ikey">EXP Base</span>
                <span class="bw-ival" x-text="modal.data?.base_exp"></span>
              </div>
            </template>
          </div>
        </div>

        <!-- Stats -->
        <div class="bw-msect">
          <div class="bw-msect-title">Estatísticas base</div>
          <div class="bw-stats">
            <template x-for="s in statRows(modal.data)" :key="s.key">
              <div class="bw-srow">
                <div class="bw-slbl" x-text="s.label"></div>
                <div class="bw-strack">
                  <div class="bw-sbar" :style="`width:${statBarPct(s.val)};background:${s.color}`"></div>
                </div>
                <div class="bw-sval" x-text="s.val"></div>
              </div>
            </template>
            <div class="bw-stotal">
              <div class="bw-stlbl">Total</div>
              <div class="bw-stval" x-text="statTotal(modal.data)"></div>
            </div>
          </div>
        </div>

        <!-- Dex entries -->
        <template x-if="modal.data?.dex_entries?.length > 0">
          <div class="bw-msect">
            <div class="bw-msect-title">Entradas da Pokédex</div>
            <div class="bw-dex">
              <template x-for="(entry, i) in modal.data?.dex_entries" :key="i">
                <div class="bw-dex-entry" x-text="entry"></div>
              </template>
            </div>
          </div>
        </template>

        <!-- Move list -->
        <template x-if="modal.extra?.moves?.length > 0">
          <div class="bw-msect">
            <div class="bw-msect-title">Moves aprendidos</div>
            <template x-for="group in groupedMoves(modal.extra?.moves ?? [])" :key="group.method">
              <div style="margin-bottom:10px">
                <div class="bw-method-label" x-text="methodLabel(group.method)"></div>

                <!-- Por Nível: 2 colunas (Nível + Nome) -->
                <template x-if="group.method === 'level-up'">
                  <table class="bw-mtable">
                    <thead><tr><th>Nível</th><th>Nome</th></tr></thead>
                    <tbody>
                      <template x-for="(mv, idx) in group.moves" :key="idx">
                        <tr>
                          <td x-text="mv.level ?? '—'" style="width:60px;opacity:.65"></td>
                          <td><button class="bw-mlink" @click="openMoveByName(mv.move_name)" x-text="mv.move_name"></button></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </template>

                <!-- Outros métodos: só Nome -->
                <template x-if="group.method !== 'level-up'">
                  <table class="bw-mtable">
                    <thead><tr><th>Nome</th></tr></thead>
                    <tbody>
                      <template x-for="(mv, idx) in group.moves" :key="idx">
                        <tr>
                          <td><button class="bw-mlink" @click="openMoveByName(mv.move_name)" x-text="mv.move_name"></button></td>
                        </tr>
                      </template>
                    </tbody>
                  </table>
                </template>
              </div>
            </template>
          </div>
        </template>
      </div>
      </template>

      <!-- ── ITEM MODAL BODY ───────────────────────────────── -->
      <template x-if="modal.type === 'item' && !modal.loading && modal.data">
      <div class="bw-mbody">

        <!-- Sprite carousel -->
        <template x-if="itemSprites(modal.data).length > 0">
          <div class="bw-carousel">
            <div class="bw-carousel-frame">
              <img :src="itemSprites(modal.data)[carouselIdx]" :alt="modal.data?.name">
            </div>
            <div class="bw-carousel-dots" x-show="itemSprites(modal.data).length > 1">
              <template x-for="(_, di) in itemSprites(modal.data)" :key="di">
                <div class="bw-dot" :class="{ active: carouselIdx === di }" @click="carouselIdx = di"></div>
              </template>
            </div>
          </div>
        </template>

        <!-- Price -->
        <div class="bw-msect">
          <div class="bw-msect-title">Preço</div>
          <div class="bw-ival" style="font-size:15px;font-weight:700;color:var(--color)"
            x-text="fmtPrice(modal.data?.price) ?? 'Sem preço definido'"></div>
        </div>

        <!-- Description -->
        <template x-if="modal.data?.description">
          <div class="bw-msect">
            <div class="bw-msect-title">Descrição</div>
            <div class="bw-prose" x-html="modal.data?.description"></div>
          </div>
        </template>

        <!-- Crafting -->
        <template x-if="modal.extra?.crafting">
          <div class="bw-msect">
            <div class="bw-msect-title">Receita de craft</div>
            <div class="bw-igrid" style="margin-bottom:8px">
              <template x-if="modal.extra.crafting.craft_skill">
                <div class="bw-irow">
                  <span class="bw-ikey">Habilidade</span>
                  <span class="bw-ival" x-text="modal.extra.crafting.craft_skill"></span>
                </div>
              </template>
              <div class="bw-irow">
                <span class="bw-ikey">Resultado</span>
                <span class="bw-ival" x-text="(modal.extra.crafting.result_quantity ?? 1) + ' unidade(s)'"></span>
              </div>
            </div>
            <div class="bw-craft-slots">
              <template x-for="(slot, si) in (modal.extra.crafting.crafting_slots ?? [])" :key="si">
                <div class="bw-craft-slot">
                  <span class="bw-craft-qty" x-text="slot.quantity + '×'"></span>
                  <div class="bw-craft-opts">
                    <template x-for="(opt, oi) in slot.crafting_slot_options" :key="oi">
                      <span>
                        <template x-if="oi > 0"><span class="bw-craft-sep">ou</span></template>
                        <template x-if="slotOptionLabel(opt).itemId">
                          <button class="bw-mlink" @click="openItemById(slotOptionLabel(opt).itemId)"
                            x-text="slotOptionLabel(opt).text"></button>
                        </template>
                        <template x-if="!slotOptionLabel(opt).itemId">
                          <span x-text="slotOptionLabel(opt).text"></span>
                        </template>
                      </span>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>
        </template>

        <!-- Berry -->
        <template x-if="modal.extra?.berry">
          <div class="bw-msect">
            <div class="bw-msect-title">Dados de Berry</div>
            <div class="bw-igrid" style="margin-bottom:10px">
              <template x-if="modal.extra.berry.rarity">
                <div class="bw-irow">
                  <span class="bw-ikey">Raridade</span>
                  <span class="bw-ival" x-text="modal.extra.berry.rarity"></span>
                </div>
              </template>
              <template x-if="modal.extra.berry.seasons?.length">
                <div class="bw-irow">
                  <span class="bw-ikey">Temporadas</span>
                  <span class="bw-ival" x-text="modal.extra.berry.seasons.join(', ')"></span>
                </div>
              </template>
            </div>
            <div class="bw-msect-title" style="margin-bottom:6px">Flavors</div>
            <div class="bw-flavors">
              <template x-for="fl in berryFlavors(modal.extra.berry)" :key="fl.label">
                <div class="bw-flavor-row">
                  <span class="bw-flavor-lbl" x-text="fl.label"></span>
                  <div class="bw-flavor-track">
                    <div class="bw-flavor-fill" :style="`width:${fl.val*10}%`"></div>
                  </div>
                  <span style="font-size:12px;width:20px;text-align:right;opacity:.7" x-text="fl.val"></span>
                </div>
              </template>
            </div>
          </div>
        </template>
      </div>
      </template>

      <!-- ── MOVE MODAL BODY ───────────────────────────────── -->
      <template x-if="modal.type === 'move' && !modal.loading && modal.data">
      <div class="bw-mbody">

        <!-- Stats grid -->
        <div class="bw-move-stats">
          <template x-if="modal.data?.power != null">
            <div class="bw-move-stat-cell">
              <span class="bw-move-stat-lbl">Poder</span>
              <span class="bw-move-stat-val" x-text="modal.data?.power"></span>
            </div>
          </template>
          <template x-if="modal.data?.accuracy != null">
            <div class="bw-move-stat-cell">
              <span class="bw-move-stat-lbl">Precisão</span>
              <span class="bw-move-stat-val" x-text="modal.data?.accuracy + '%'"></span>
            </div>
          </template>
          <template x-if="modal.data?.pp != null">
            <div class="bw-move-stat-cell">
              <span class="bw-move-stat-lbl">PP</span>
              <span class="bw-move-stat-val" x-text="modal.data?.pp"></span>
            </div>
          </template>
          <div class="bw-move-stat-cell">
            <span class="bw-move-stat-lbl">Prioridade</span>
            <span class="bw-move-stat-val" x-text="(modal.data?.priority ?? 0) > 0 ? '+' + modal.data?.priority : (modal.data?.priority ?? 0)"></span>
          </div>
          <template x-if="modal.data?.target">
            <div class="bw-move-stat-cell" style="grid-column:1/-1">
              <span class="bw-move-stat-lbl">Alvo</span>
              <span class="bw-move-stat-val" style="font-size:12px" x-text="modal.data?.target"></span>
            </div>
          </template>
        </div>

        <!-- Description -->
        <template x-if="modal.data?.description">
          <div class="bw-msect">
            <div class="bw-msect-title">Descrição</div>
            <div class="bw-prose" x-text="modal.data?.description"></div>
          </div>
        </template>

        <!-- Out of battle effect -->
        <template x-if="modal.data?.out_of_battle_effect">
          <div class="bw-msect">
            <div class="bw-msect-title">Efeito fora de batalha</div>
            <div class="bw-prose" x-html="modal.data?.out_of_battle_effect"></div>
          </div>
        </template>

        <!-- Contest -->
        <template x-if="modal.data?.contest_points">
          <div class="bw-msect">
            <div class="bw-msect-title">Contest Points</div>
            <div class="bw-ival" x-text="modal.data?.contest_points"></div>
          </div>
        </template>

        <!-- Learned by -->
        <template x-if="modal.extra?.learnedBy?.length > 0">
          <div class="bw-msect">
            <div class="bw-msect-title">Aprendido por</div>
            <div class="bw-poke-list">
              <template x-for="(pm, pi) in modal.extra.learnedBy" :key="pi">
                <button class="bw-poke-chip" @click="openPokemonById(pm.pokemon_id)">
                  <span x-text="pm.pokemon?.name ?? ('Pokémon #' + pm.pokemon_id)"></span>
                  <template x-if="pm.learn_method === 'level-up' && pm.level">
                    <span class="bw-poke-chip-lvl" x-text="'Nv.' + pm.level"></span>
                  </template>
                  <template x-if="pm.learn_method === 'machine'">
                    <span class="bw-poke-chip-lvl">MT</span>
                  </template>
                </button>
              </template>
            </div>
          </div>
        </template>
      </div>
      </template>

      <!-- ── ABILITY MODAL BODY ────────────────────────────── -->
      <template x-if="modal.type === 'ability' && !modal.loading && modal.data">
      <div class="bw-mbody">

        <!-- Description -->
        <template x-if="modal.data?.description">
          <div class="bw-msect">
            <div class="bw-msect-title">Descrição</div>
            <div class="bw-prose" x-text="modal.data?.description"></div>
          </div>
        </template>

        <!-- Out of battle -->
        <template x-if="modal.data?.out_of_battle_effect">
          <div class="bw-msect">
            <div class="bw-msect-title">Efeito fora de batalha</div>
            <div class="bw-prose" x-html="modal.data?.out_of_battle_effect"></div>
          </div>
        </template>

        <!-- Pokémon with this ability — placeholder -->
        <div class="bw-msect">
          <div class="bw-msect-title">Pokémon com esta habilidade</div>
          <div style="text-align:center;padding:24px 0;opacity:.4;font-size:13px">
            🔧 Em breve
          </div>
        </div>
      </div>
      </template>

    </div><!-- .bw-modal -->
  </div><!-- .bw-overlay -->

</div><!-- #bulbawiki -->
</body>
</html>
