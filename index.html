<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BulbaWiki</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/wiki.css">
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>
<script src="js/api.js"></script>
<script src="js/hooks.js"></script>
<script src="js/router.js"></script>
<script src="components/modal.js"></script>
<script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
</head>
<body>
<div id="bulbawiki">

  <!-- Nav -->
  <div class="bw-title">
    <div class="bw-title-dot"></div>
    <span class="bw-title-text" style="cursor:pointer" onclick="goTo('/')">BulbaWiki</span>
  </div>
  <nav class="bw-tabs">
    <button class="bw-tab" id="tab-pokemon"   onclick="goTo('/pokemon')"><i class="fa-solid fa-leaf"></i> Pokémon</button>
    <button class="bw-tab" id="tab-moves"     onclick="goTo('/moves')"><i class="fa-solid fa-bolt"></i> Moves</button>
    <button class="bw-tab" id="tab-abilities" onclick="goTo('/abilities')"><i class="fa-solid fa-shield-halved"></i> Habilidades</button>
    <button class="bw-tab" id="tab-items"     onclick="goTo('/items')"><i class="fa-solid fa-bag-shopping"></i> Itens</button>
  </nav>

  <main id="bw-main" style="min-height:300px"></main>

  <!-- Modal global -->
  <div x-data="modal()"
    @bw:open-modal.document="openModal($event.detail.type, $event.detail.data)"
    @keydown.escape.window="if(open) closeModal()">

    <div class="bw-overlay" x-show="open" x-cloak @click.self="closeModal()">
      <div class="bw-modal" x-show="open" x-transition>

        <!-- Header -->
        <div class="bw-mhead" x-show="data">
          <div class="bw-mhead-left">
            <div class="bw-mhead-title" x-text="data&&data.name"></div>
            <template x-if="type==='pokemon'&&data"><div class="bw-mhead-sub" x-text="pokemonId(data)"></div></template>
            <template x-if="type==='item'&&data&&data.category_name"><div class="bw-mhead-sub" x-text="data.category_name"></div></template>
            <div class="bw-mhead-badges">
              <template x-if="type==='pokemon'&&data&&data.type1"><img class="bw-type-img" :src="'assets/types/type-'+data.type1+'.png'" :alt="data.type1" @error="this.style.display='none'"></template>
              <template x-if="type==='pokemon'&&data&&data.type2"><img class="bw-type-img" :src="'assets/types/type-'+data.type2+'.png'" :alt="data.type2" @error="this.style.display='none'"></template>
              <template x-if="type==='move'&&data&&data.type"><img class="bw-type-img" :src="'assets/types/type-'+data.type+'.png'" :alt="data.type" @error="this.style.display='none'"></template>
              <template x-if="type==='move'&&data&&data.category"><img class="bw-cat-img" :src="'assets/categories/category-'+data.category+'.png'" :alt="data.category" @error="this.style.display='none'"></template>
              <template x-if="(type==='move'||type==='ability')&&data&&data.status"><span class="bw-badge-status" :style="statusBadgeStyle(data.status)" x-text="statusLabel(data.status)"></span></template>
            </div>
          </div>
          <div class="bw-mbtns">
            <button class="bw-mbtn" :class="{copied:copiedUrl}" @click="copyUrl()" :title="copiedUrl?'URL copiada!':'Copiar link'">
              <i :class="copiedUrl?'fa-solid fa-check':'fa-solid fa-link'"></i>
            </button>
            <template x-if="history.length>0">
              <button class="bw-mbtn" @click="goBack()" title="Voltar"><i class="fa-solid fa-arrow-left"></i></button>
            </template>
            <button class="bw-mbtn" @click="closeModal()" title="Fechar"><i class="fa-solid fa-xmark"></i></button>
          </div>
        </div>

        <div class="bw-mloading" x-show="loading"><div class="bw-spinner"></div></div>

        <!-- ── POKÉMON ──────────────────────────────────────── -->
        <template x-if="type==='pokemon'&&!loading&&data">
        <div class="bw-mbody">
          <div class="bw-artwork">
            <template x-if="artworkUrl(data)"><img :src="artworkUrl(data)" :alt="data.name"></template>
            <template x-if="!artworkUrl(data)"><div class="bw-artwork-ph"><i class="fa-solid fa-circle-question"></i></div></template>
            <div class="bw-artwork-tog" x-show="data.artwork_shadow||data.artwork_aura">
              <button class="bw-atbtn" :class="{active:activeArtwork==='normal'}" @click="activeArtwork='normal'">Normal</button>
              <template x-if="data.artwork_shadow"><button class="bw-atbtn" :class="{active:activeArtwork==='shadow'}" @click="activeArtwork='shadow'">Sombra</button></template>
              <template x-if="data.artwork_aura"><button class="bw-atbtn" :class="{active:activeArtwork==='aura'}" @click="activeArtwork='aura'">Aura</button></template>
            </div>
          </div>

          <!-- Info + Stats em 2 colunas -->
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;align-items:start">
            <div class="bw-msect">
              <div class="bw-msect-title">Estatísticas base</div>
              <div class="bw-stats">
                <template x-for="s in statRows(data)" :key="s.key">
                  <div class="bw-srow">
                    <div class="bw-slbl" x-text="s.label"></div>
                    <div class="bw-strack"><div class="bw-sbar" :style="'width:'+statBarPct(s.val)+';background:'+s.color"></div></div>
                    <div class="bw-sval" x-text="s.val"></div>
                  </div>
                </template>
                <div class="bw-stotal"><div class="bw-stlbl">Total</div><div class="bw-stval" x-text="statTotal(data)"></div></div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:10px">
              <div class="bw-msect">
                <div class="bw-msect-title">Informações</div>
                <div style="display:flex;flex-direction:column;gap:6px">
                  <div class="bw-irow"><span class="bw-ikey">Gênero</span>
                    <div class="bw-ival" style="display:flex;gap:5px;flex-wrap:wrap">
                      <template x-if="data.gender_male!=null&&data.gender_male>0">
                        <span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:#e8f0fd;color:#1a3a8a;font-size:11px;font-weight:600">
                          <i class="fa-solid fa-mars"></i> <span x-text="data.gender_male+'%'"></span>
                        </span>
                      </template>
                      <template x-if="data.gender_female!=null&&data.gender_female>0">
                        <span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:#fde8f0;color:#8a1a4a;font-size:11px;font-weight:600">
                          <i class="fa-solid fa-venus"></i> <span x-text="data.gender_female+'%'"></span>
                        </span>
                      </template>
                      <template x-if="data.gender_male==null">
                        <span style="display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:var(--row);color:var(--colortext);font-size:11px;opacity:.6">
                          <i class="fa-solid fa-genderless"></i> Sem gênero
                        </span>
                      </template>
                    </div>
                  </div>
                  <template x-if="data.egg_group1">
                    <div class="bw-irow"><span class="bw-ikey">Grupo de Ovo</span>
                      <span class="bw-ival" x-text="[EGG_GROUP_LABELS[data.egg_group1]||data.egg_group1, EGG_GROUP_LABELS[data.egg_group2]||data.egg_group2].filter(Boolean).join(', ')"></span></div>
                  </template>
                  <div class="bw-irow"><span class="bw-ikey">Pode cruzar</span><span class="bw-ival" x-text="data.can_breed?'Sim':'Não'"></span></div>
                  <template x-if="data.form_type"><div class="bw-irow"><span class="bw-ikey">Forma</span><span class="bw-ival" x-text="data.form_type"></span></div></template>
                </div>
              </div>
              <!-- Habilidades compactas -->
              <template x-if="extra&&extra.abilities&&extra.abilities.length>0">
                <div class="bw-msect">
                  <div class="bw-msect-title">Habilidades</div>
                  <div style="display:flex;flex-direction:column;gap:4px">
                    <template x-for="ab in extra.abilities" :key="ab.id">
                      <div style="display:flex;align-items:center;justify-content:space-between;gap:6px;padding:4px 8px;background:var(--row);border-radius:6px">
                        <span style="font-size:12px;font-weight:600" x-text="ab.abilities&&ab.abilities.name"></span>
                        <span style="font-size:9px;opacity:.5;text-transform:capitalize;flex-shrink:0" x-text="ab.ability_type"></span>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Onde encontrar -->
          <template x-if="extra&&extra.locations&&hasLocations(extra.locations)">
            <div class="bw-msect">
              <div class="bw-msect-title">Onde encontrar</div>
              <template x-if="extra.locations.maps&&extra.locations.maps.length>0">
                <div style="margin-bottom:8px">
                  <div class="bw-method-label"><i class="fa-solid fa-map"></i> Mapas</div>
                  <div style="display:flex;flex-direction:column;gap:5px">
                    <template x-for="loc in extra.locations.maps" :key="loc.id">
                      <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--row);border-radius:8px;font-size:13px;flex-wrap:wrap">
                        <template x-if="loc.maps&&loc.maps.forum_url">
                          <a :href="loc.maps.forum_url" target="_blank" rel="noopener" style="font-weight:600;color:var(--color);text-decoration:none" x-text="loc.maps&&loc.maps.name"></a>
                        </template>
                        <template x-if="!loc.maps||!loc.maps.forum_url"><span style="font-weight:600" x-text="loc.maps&&loc.maps.name"></span></template>
                        <span class="bw-badge-status" style="background:var(--forums);font-size:10px" x-text="rarityLabel(loc.rarity)"></span>
                        <span style="font-size:11px;opacity:.6" x-text="formatSeasons(loc.seasons)"></span>
                        <template x-if="loc.time_of_day"><span style="font-size:11px;opacity:.6" x-text="formatTime(loc.time_of_day)"></span></template>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
              <template x-if="extra.locations.routeObjects&&extra.locations.routeObjects.length>0">
                <div>
                  <div class="bw-method-label"><i class="fa-solid fa-tree"></i> Objetos de Rota</div>
                  <div style="display:flex;flex-direction:column;gap:5px">
                    <template x-for="loc in extra.locations.routeObjects" :key="loc.id">
                      <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--row);border-radius:8px;font-size:13px;flex-wrap:wrap">
                        <template x-if="loc.route_objects&&loc.route_objects.forum_url">
                          <a :href="loc.route_objects.forum_url" target="_blank" rel="noopener" style="font-weight:600;color:var(--color);text-decoration:none" x-text="loc.route_objects&&loc.route_objects.name"></a>
                        </template>
                        <template x-if="!loc.route_objects||!loc.route_objects.forum_url"><span style="font-weight:600" x-text="loc.route_objects&&loc.route_objects.name"></span></template>
                        <span style="font-size:11px;opacity:.6" x-text="formatSeasons(loc.seasons)"></span>
                        <template x-if="loc.time_of_day"><span style="font-size:11px;opacity:.6" x-text="formatTime(loc.time_of_day)"></span></template>
                      </div>
                    </template>
                  </div>
                </div>
              </template>
            </div>
          </template>

          <!-- Itens que dropa -->
          <template x-if="extra&&extra.drops&&hasDrops(extra.drops)">
            <div class="bw-msect">
              <div class="bw-msect-title">Itens que dropa / produz</div>
              <template x-if="extra.drops.held&&extra.drops.held.length>0">
                <div style="margin-bottom:8px">
                  <div class="bw-method-label"><i class="fa-solid fa-hand-holding"></i> Itens carregados</div>
                  <div class="bw-poke-list">
                    <template x-for="(h,i) in visibleChips('dropsHeld', extra.drops.held)" :key="i">
                      <button class="bw-poke-chip" @click="openItemById(h.items&&h.items.id)">
                        <template x-if="h.items&&h.items.sprites&&h.items.sprites[0]">
                          <img :src="h.items.sprites[0]" class="bw-chip-img" loading="lazy">
                        </template>
                        <span x-text="h.items&&h.items.name"></span>
                        <template x-if="h.roll"><span class="bw-poke-chip-lvl" x-text="h.roll"></span></template>
                      </button>
                    </template>
                  </div>
                  <button x-show="hasMore('dropsHeld', extra.drops.held)" @click="toggleChips('dropsHeld')" class="bw-chips-more">
                    <span x-show="!_chipsExpanded['dropsHeld']">Ver mais (<span x-text="hiddenCount('dropsHeld', extra.drops.held)"></span>)</span>
                    <span x-show="_chipsExpanded['dropsHeld']">Mostrar menos</span>
                  </button>
                </div>
              </template>
              <template x-if="extra.drops.produced&&extra.drops.produced.length>0">
                <div>
                  <div class="bw-method-label"><i class="fa-solid fa-seedling"></i> Itens produzidos</div>
                  <div class="bw-poke-list">
                    <template x-for="(pr,i) in visibleChips('dropsProduced', extra.drops.produced)" :key="i">
                      <button class="bw-poke-chip" @click="openItemById(pr.items&&pr.items.id)">
                        <template x-if="pr.items&&pr.items.sprites&&pr.items.sprites[0]">
                          <img :src="pr.items.sprites[0]" class="bw-chip-img" loading="lazy">
                        </template>
                        <span x-text="pr.items&&pr.items.name"></span>
                        <template x-if="pr.tempo"><span class="bw-poke-chip-lvl" x-text="pr.tempo"></span></template>
                      </button>
                    </template>
                  </div>
                  <button x-show="hasMore('dropsProduced', extra.drops.produced)" @click="toggleChips('dropsProduced')" class="bw-chips-more">
                    <span x-show="!_chipsExpanded['dropsProduced']">Ver mais (<span x-text="hiddenCount('dropsProduced', extra.drops.produced)"></span>)</span>
                    <span x-show="_chipsExpanded['dropsProduced']">Mostrar menos</span>
                  </button>
                </div>
              </template>
            </div>
          </template>

          <!-- Dex entries -->
          <template x-if="data.dex_entries&&data.dex_entries.length>0">
            <div class="bw-msect">
              <div class="bw-msect-title">Entradas da Pokédex</div>
              <div class="bw-dex">
                <template x-for="(entry,i) in data.dex_entries" :key="i">
                  <div class="bw-dex-entry" x-text="entry"></div>
                </template>
              </div>
            </div>
          </template>

          <!-- Moves -->
          <template x-if="extra&&extra.moves&&extra.moves.length>0">
            <div class="bw-msect">
              <div class="bw-msect-title">Moves aprendidos</div>
              <template x-for="group in groupedMoves(extra.moves)" :key="group.method">
                <div style="margin-bottom:12px">
                  <div class="bw-method-label" x-text="methodLabel(group.method)"></div>
                  <!-- Level: tabela com coluna de nível -->
                  <template x-if="group.method==='level'">
                    <table class="bw-mtable">
                      <thead><tr><th>Nível</th><th>Nome</th></tr></thead>
                      <tbody>
                        <template x-for="(mv,i) in group.moves" :key="i">
                          <tr>
                            <td x-text="mv.level||'—'" style="width:60px;opacity:.65"></td>
                            <td><button class="bw-mlink" @click="openMoveById(mv.move_id)" x-text="mv.moves&&mv.moves.name||mv.move_id"></button></td>
                          </tr>
                        </template>
                      </tbody>
                    </table>
                  </template>
                  <!-- Outros: chips -->
                  <template x-if="group.method!=='level'">
                    <div class="bw-poke-list">
                      <template x-for="(mv,i) in group.moves" :key="i">
                        <button class="bw-poke-chip" @click="openMoveById(mv.move_id)" x-text="mv.moves&&mv.moves.name||mv.move_id"></button>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
        </template>

        <!-- ── ITEM ────────────────────────────────────────── -->
        <template x-if="type==='item'&&!loading&&data">
        <div class="bw-mbody">
          <template x-if="extra&&itemSprites(data).length>0">
            <div class="bw-carousel">
              <div class="bw-carousel-frame"><img :src="itemSprites(data)[carouselIdx]" :alt="data.name"></div>
              <div class="bw-carousel-dots" x-show="itemSprites(data).length>1">
                <template x-for="(_,di) in itemSprites(data)" :key="di">
                  <div class="bw-dot" :class="{active:carouselIdx===di}" @click="carouselIdx=di"></div>
                </template>
              </div>
            </div>
          </template>

          <div class="bw-msect">
            <div class="bw-msect-title">Preço</div>
            <div class="bw-ival" style="font-size:15px;font-weight:700;color:var(--color)"
              x-text="data.price!=null?('₽\u202f'+data.price.toLocaleString('pt-BR')):'Sem preço definido'"></div>
          </div>

          <template x-if="data.description">
            <div class="bw-msect"><div class="bw-msect-title">Descrição</div><div class="bw-prose" x-html="data.description"></div></div>
          </template>

          <!-- Dropado / Produzido por Pokémon -->
          <template x-if="extra&&extra.droppedBy&&hasDroppedBy(extra.droppedBy)">
            <div class="bw-msect">
              <div class="bw-msect-title">Obtido de Pokémon</div>
              <template x-if="extra.droppedBy.held&&extra.droppedBy.held.length>0">
                <div style="margin-bottom:8px">
                  <div class="bw-method-label"><i class="fa-solid fa-hand-holding"></i> Carregado por</div>
                  <div class="bw-poke-list">
                    <template x-for="(h,i) in visibleChips('droppedByHeld', extra.droppedBy.held)" :key="i">
                      <button class="bw-poke-chip" @click="openPokemonById(h.pokemon&&h.pokemon.id)">
                        <template x-if="h.pokemon&&h.pokemon.artwork_normal">
                          <img :src="h.pokemon.artwork_normal" class="bw-chip-img" loading="lazy">
                        </template>
                        <span x-text="h.pokemon&&h.pokemon.name"></span>
                        <template x-if="h.roll"><span class="bw-poke-chip-lvl" x-text="h.roll"></span></template>
                      </button>
                    </template>
                  </div>
                  <button x-show="hasMore('droppedByHeld', extra.droppedBy.held)" @click="toggleChips('droppedByHeld')" class="bw-chips-more">
                    <span x-show="!_chipsExpanded['droppedByHeld']">Ver mais (<span x-text="hiddenCount('droppedByHeld', extra.droppedBy.held)"></span>)</span>
                    <span x-show="_chipsExpanded['droppedByHeld']">Mostrar menos</span>
                  </button>
                </div>
              </template>
              <template x-if="extra.droppedBy.produced&&extra.droppedBy.produced.length>0">
                <div>
                  <div class="bw-method-label"><i class="fa-solid fa-seedling"></i> Produzido por</div>
                  <div class="bw-poke-list">
                    <template x-for="(pr,i) in visibleChips('droppedByProduced', extra.droppedBy.produced)" :key="i">
                      <button class="bw-poke-chip" @click="openPokemonById(pr.pokemon&&pr.pokemon.id)">
                        <template x-if="pr.pokemon&&pr.pokemon.artwork_normal">
                          <img :src="pr.pokemon.artwork_normal" class="bw-chip-img" loading="lazy">
                        </template>
                        <span x-text="pr.pokemon&&pr.pokemon.name"></span>
                        <template x-if="pr.tempo"><span class="bw-poke-chip-lvl" x-text="pr.tempo"></span></template>
                      </button>
                    </template>
                  </div>
                  <button x-show="hasMore('droppedByProduced', extra.droppedBy.produced)" @click="toggleChips('droppedByProduced')" class="bw-chips-more">
                    <span x-show="!_chipsExpanded['droppedByProduced']">Ver mais (<span x-text="hiddenCount('droppedByProduced', extra.droppedBy.produced)"></span>)</span>
                    <span x-show="_chipsExpanded['droppedByProduced']">Mostrar menos</span>
                  </button>
                </div>
              </template>
            </div>
          </template>

          <!-- Como obter: Objetos de Rota -->
          <template x-if="extra&&extra.sources&&extra.sources.routeObjects&&extra.sources.routeObjects.length>0">
            <div class="bw-msect">
              <div class="bw-msect-title">Como obter — Objetos de Rota</div>
              <div style="display:flex;flex-direction:column;gap:5px">
                <template x-for="src in extra.sources.routeObjects" :key="src.id">
                  <div style="display:flex;align-items:center;gap:8px;padding:7px 10px;background:var(--row);border-radius:8px;font-size:13px;flex-wrap:wrap">
                    <template x-if="src.route_objects&&src.route_objects.forum_url">
                      <a :href="src.route_objects.forum_url" target="_blank" rel="noopener" style="font-weight:600;color:var(--color);text-decoration:none" x-text="src.route_objects&&src.route_objects.name"></a>
                    </template>
                    <template x-if="!src.route_objects||!src.route_objects.forum_url"><span style="font-weight:600" x-text="src.route_objects&&src.route_objects.name"></span></template>
                    <span style="font-size:11px;opacity:.6" x-text="formatSeasons(src.seasons)"></span>
                    <template x-if="src.time_of_day"><span style="font-size:11px;opacity:.6" x-text="formatTime(src.time_of_day)"></span></template>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Como obter: Quests -->
          <template x-if="extra&&extra.sources&&extra.sources.quests&&extra.sources.quests.length>0">
            <div class="bw-msect">
              <div class="bw-msect-title">Como obter — Recompensa de Quest</div>
              <div style="display:flex;flex-direction:column;gap:5px">
                <template x-for="q in extra.sources.quests" :key="q.id">
                  <div style="padding:7px 10px;background:var(--row);border-radius:8px;font-size:13px">
                    <div style="font-weight:600" x-text="q.npc_quests&&q.npc_quests.name"></div>
                    <template x-if="q.npc_quests&&q.npc_quests.npcs">
                      <div style="font-size:11px;opacity:.6;margin-top:2px">NPC:
                        <template x-if="q.npc_quests.npcs.forum_url">
                          <a :href="q.npc_quests.npcs.forum_url" target="_blank" rel="noopener" style="color:var(--color);font-weight:600;text-decoration:none" x-text="q.npc_quests.npcs.name"></a>
                        </template>
                        <template x-if="!q.npc_quests.npcs.forum_url"><span x-text="q.npc_quests.npcs.name"></span></template>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Craft -->
          <template x-if="extra&&extra.crafting">
            <div class="bw-msect">
              <div class="bw-msect-title"><i class="fa-solid fa-hammer"></i> Receita de craft</div>
              <div class="bw-igrid" style="margin-bottom:8px">
                <template x-if="extra.crafting.craft_skill"><div class="bw-irow"><span class="bw-ikey">Habilidade</span><span class="bw-ival" x-text="extra.crafting.craft_skill"></span></div></template>
                <div class="bw-irow"><span class="bw-ikey">Resultado</span><span class="bw-ival" x-text="(extra.crafting.result_quantity||1)+' unidade(s)'"></span></div>
              </div>
              <div class="bw-craft-slots">
                <template x-for="(slot,si) in (extra.crafting.crafting_slots||[])" :key="si">
                  <div class="bw-craft-slot">
                    <span class="bw-craft-qty" x-text="slot.quantity+'×'"></span>
                    <div class="bw-craft-opts">
                      <template x-for="(opt,oi) in slot.crafting_slot_options" :key="oi">
                        <span>
                          <template x-if="oi>0"><span class="bw-craft-sep">ou</span></template>
                          <template x-if="slotOptionLabel(opt).itemId"><button class="bw-mlink" @click="openItemById(slotOptionLabel(opt).itemId)" x-text="slotOptionLabel(opt).text"></button></template>
                          <template x-if="!slotOptionLabel(opt).itemId"><span x-text="slotOptionLabel(opt).text"></span></template>
                        </span>
                      </template>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Berry -->
          <template x-if="extra&&extra.berry">
            <div class="bw-msect">
              <div class="bw-msect-title"><i class="fa-solid fa-leaf"></i> Dados de Berry</div>
              <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px">
                <!-- Raridade pill -->
                <template x-if="extra.berry.rarity">
                  <span :style="'display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:'+(BERRY_RARITY_META[(extra.berry.rarity||'').toLowerCase()]||{bg:\'var(--row)\',color:\'var(--colortext)\'}).bg+';color:'+(BERRY_RARITY_META[(extra.berry.rarity||'').toLowerCase()]||{color:\'var(--colortext)\'}).color">
                    <i :class="(BERRY_RARITY_META[(extra.berry.rarity||'').toLowerCase()]||{icon:'fa-solid fa-circle'}).icon" style="font-size:10px"></i>
                    <span x-text="(BERRY_RARITY_META[(extra.berry.rarity||'').toLowerCase()]||{label:extra.berry.rarity}).label"></span>
                  </span>
                </template>
                <!-- Season pills -->
                <template x-if="extra.berry.seasons&&extra.berry.seasons.length">
                  <template x-for="s in extra.berry.seasons" :key="s">
                    <span :style="'display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;background:'+(SEASON_META[s]||{bg:'var(--row)'}).bg+';color:'+(SEASON_META[s]||{color:'var(--colortext)'}).color">
                      <i :class="(SEASON_META[s]||{icon:'fa-solid fa-calendar'}).icon" style="font-size:10px"></i>
                      <span x-text="(SEASON_META[s]||{label:s}).label"></span>
                    </span>
                  </template>
                </template>
              </div>
              <div class="bw-msect-title" style="margin-bottom:6px">Flavors</div>
              <div class="bw-flavors">
                <template x-for="fl in berryFlavors(extra.berry)" :key="fl.label">
                  <div class="bw-flavor-row">
                    <span class="bw-flavor-lbl" x-text="fl.label"></span>
                    <div class="bw-flavor-track"><div class="bw-flavor-fill" :style="'width:'+fl.val*10+'%'"></div></div>
                    <span style="font-size:12px;width:20px;text-align:right;opacity:.7" x-text="fl.val"></span>
                  </div>
                </template>
              </div>
            </div>
          </template>
        </div>
        </template>

        <!-- ── MOVE ────────────────────────────────────────── -->
        <template x-if="type==='move'&&!loading&&data">
        <div class="bw-mbody">
          <div class="bw-move-stats">
            <template x-if="data.power!=null"><div class="bw-move-stat-cell"><span class="bw-move-stat-lbl">Poder</span><span class="bw-move-stat-val" x-text="data.power"></span></div></template>
            <template x-if="data.accuracy!=null"><div class="bw-move-stat-cell"><span class="bw-move-stat-lbl">Precisão</span><span class="bw-move-stat-val" x-text="data.accuracy+'%'"></span></div></template>
            <template x-if="data.pp!=null"><div class="bw-move-stat-cell"><span class="bw-move-stat-lbl">PP</span><span class="bw-move-stat-val" x-text="data.pp"></span></div></template>
            <div class="bw-move-stat-cell"><span class="bw-move-stat-lbl">Prioridade</span><span class="bw-move-stat-val" x-text="(data.priority||0)>0?'+'+data.priority:(data.priority||0)"></span></div>
          </div>
          <template x-if="data.description"><div class="bw-msect"><div class="bw-msect-title">Descrição</div><div class="bw-prose" x-text="data.description"></div></div></template>
          <template x-if="data.contest_points"><div class="bw-msect"><div class="bw-msect-title">Contest Points</div><div class="bw-ival" x-text="data.contest_points"></div></div></template>
          <template x-if="extra&&extra.learnedBy&&extra.learnedBy.length>0">
            <div class="bw-msect">
              <div class="bw-msect-title">Aprendido por</div>
              <div class="bw-poke-list">
                <template x-for="(pm,i) in visibleChips('learnedBy', extra.learnedBy)" :key="i">
                  <button class="bw-poke-chip" @click="openPokemonById(pm.pokemon&&pm.pokemon.id)">
                    <template x-if="pm.pokemon&&pm.pokemon.artwork_normal">
                      <img :src="pm.pokemon.artwork_normal" class="bw-chip-img" loading="lazy">
                    </template>
                    <span x-text="pm.pokemon&&pm.pokemon.name||('Pokémon #'+pm.pokemon_id)"></span>
                    <template x-if="pm.learn_method==='level'&&pm.level"><span class="bw-poke-chip-lvl" x-text="'Nv.'+pm.level"></span></template>
                  </button>
                </template>
              </div>
              <button x-show="hasMore('learnedBy', extra.learnedBy)" @click="toggleChips('learnedBy')" class="bw-chips-more">
                <span x-show="!_chipsExpanded['learnedBy']">Ver mais (<span x-text="hiddenCount('learnedBy', extra.learnedBy)"></span>)</span>
                <span x-show="_chipsExpanded['learnedBy']">Mostrar menos</span>
              </button>
            </div>
          </template>
        </div>
        </template>

        <!-- ── ABILITY ─────────────────────────────────────── -->
        <template x-if="type==='ability'&&!loading&&data">
        <div class="bw-mbody">
          <template x-if="data.description"><div class="bw-msect"><div class="bw-msect-title">Descrição</div><div class="bw-prose" x-text="data.description"></div></div></template>
          <template x-if="data.out_of_battle_effect"><div class="bw-msect"><div class="bw-msect-title"><i class="fa-solid fa-star" style="font-size:11px"></i> Efeito fora de batalha</div><div class="bw-prose" x-html="data.out_of_battle_effect"></div></div></template>
          <template x-if="extra&&extra.pokemon&&extra.pokemon.length>0">
            <div class="bw-msect">
              <div class="bw-msect-title">Pokémon com esta habilidade</div>
              <div class="bw-poke-list">
                <template x-for="(ab,i) in visibleChips('abilityPokemon', extra.pokemon)" :key="i">
                  <button class="bw-poke-chip" @click="openPokemonById(ab.pokemon&&ab.pokemon.id)">
                    <template x-if="ab.pokemon&&ab.pokemon.artwork_normal">
                      <img :src="ab.pokemon.artwork_normal" class="bw-chip-img" loading="lazy">
                    </template>
                    <span x-text="ab.pokemon&&ab.pokemon.name"></span>
                    <span class="bw-poke-chip-lvl" style="text-transform:capitalize" x-text="ab.ability_type"></span>
                  </button>
                </template>
              </div>
              <button x-show="hasMore('abilityPokemon', extra.pokemon)" @click="toggleChips('abilityPokemon')" class="bw-chips-more">
                <span x-show="!_chipsExpanded['abilityPokemon']">Ver mais (<span x-text="hiddenCount('abilityPokemon', extra.pokemon)"></span>)</span>
                <span x-show="_chipsExpanded['abilityPokemon']">Mostrar menos</span>
              </button>
            </div>
          </template>
        </div>
        </template>

      </div>
    </div>
  </div>

</div>

<script>
function _setActiveTab(hash) {
  const path = (hash||'').replace(/^#/,'')
  document.querySelectorAll('.bw-tab').forEach(function(b){ b.classList.remove('active') })
  const map = { '/pokemon':'tab-pokemon', '/moves':'tab-moves', '/abilities':'tab-abilities', '/items':'tab-items' }
  for (const prefix in map) {
    if (path.startsWith(prefix)) { const el=document.getElementById(map[prefix]); if(el)el.classList.add('active'); break }
  }
}
window.addEventListener('hashchange', function(){ _setActiveTab(window.location.hash) })
document.addEventListener('alpine:init', function(){
  _setActiveTab(window.location.hash)
  setTimeout(initRouter, 0)
})
</script>
</body>
</html>
