<div x-data="Object.assign(usePagination(12), {
  raw: [], loading: true, filtersOpen: false,
  allTypes: Object.keys(TYPE_COLORS), allEggGroups: [],
  f: { search:'', type1:'', type2:'', eggGroup:'', canBreed:false, hasArtwork:false },

  async init() {
    this.raw = await BwAPI.loadPokemon()
    const eg = new Set()
    this.raw.forEach(p => { if(p.egg_group1) eg.add(p.egg_group1); if(p.egg_group2) eg.add(p.egg_group2) })
    this.allEggGroups = Array.from(eg).sort()
    this.applyFilters(); this.loading = false
    document.addEventListener('bw:open-pokemon', e => {
      const p = this.raw.find(x => x.id === e.detail.id)
      if (p) this.open(p)
    })
  },

  applyFilters() {
    const f = this.f, q = (f.search||'').toLowerCase().trim()
    const out = this.raw.filter(p =>
      (!q          || p.name.toLowerCase().includes(q)) &&
      (!f.type1    || (p.type1||'').toLowerCase()===f.type1) &&
      (!f.type2    || (p.type2||'').toLowerCase()===f.type2) &&
      (!f.eggGroup || p.egg_group1===f.eggGroup||p.egg_group2===f.eggGroup) &&
      (!f.canBreed || p.can_breed) && (!f.hasArtwork||p.artwork_normal)
    )
    this.setItems(out)
  },

  clearFilters() { this.f={search:'',type1:'',type2:'',eggGroup:'',canBreed:false,hasArtwork:false}; this.applyFilters() },
  get activeFilters() { const f=this.f; return [f.search,f.type1,f.type2,f.eggGroup,f.canBreed,f.hasArtwork].filter(Boolean).length },

  open(p) { document.dispatchEvent(new CustomEvent('bw:open-modal',{detail:{type:'pokemon',data:p}})) },
  typeBadgeStyle(type) { const c=TYPE_COLORS[(type||'').toLowerCase()]||{bg:'#eee',text:'#555',border:'#ccc'}; return 'background:'+c.bg+';color:'+c.text+';border-color:'+c.border },
})" x-init="init()">

  <button class="bw-filter-toggle" :class="{'has-filters':activeFilters>0}" @click="filtersOpen=!filtersOpen">
    <i class="fa-solid fa-sliders"></i> Filtros
    <template x-if="activeFilters>0"><span class="bw-filter-badge" x-text="activeFilters"></span></template>
    <i class="fa-solid fa-chevron-down bw-filter-arrow" :class="{open:filtersOpen}"></i>
  </button>

  <div class="bw-filters" x-show="filtersOpen">
    <div class="bw-fg"><span class="bw-fl">Nome</span>
      <input class="bw-input" type="search" placeholder="Buscar…" x-model="f.search" @input="applyFilters()"></div>
    <div class="bw-fg"><span class="bw-fl">Tipo 1</span>
      <select class="bw-select" x-model="f.type1" @change="applyFilters()">
        <option value="">Todos</option>
        <template x-for="t in allTypes" :key="t"><option :value="t" x-text="t.charAt(0).toUpperCase()+t.slice(1)"></option></template>
      </select></div>
    <div class="bw-fg"><span class="bw-fl">Tipo 2</span>
      <select class="bw-select" x-model="f.type2" @change="applyFilters()">
        <option value="">Todos</option>
        <template x-for="t in allTypes" :key="t"><option :value="t" x-text="t.charAt(0).toUpperCase()+t.slice(1)"></option></template>
      </select></div>
    <div class="bw-fg"><span class="bw-fl">Grupo de Ovo</span>
      <select class="bw-select" x-model="f.eggGroup" @change="applyFilters()">
        <option value="">Todos</option>
        <template x-for="g in allEggGroups" :key="g"><option :value="g" x-text="g"></option></template>
      </select></div>
    <label class="bw-toggle"><input type="checkbox" x-model="f.canBreed" @change="applyFilters()"> Pode cruzar</label>
    <label class="bw-toggle"><input type="checkbox" x-model="f.hasArtwork" @change="applyFilters()"> Tem artwork</label>
    <button class="bw-btn-clear" x-show="activeFilters>0" @click="clearFilters()">Limpar filtros</button>
  </div>

  <div class="bw-bar">
    <span x-text="_items.length + ' Pokémon'"></span>
    <span x-show="totalPages()>1" x-text="'Página '+_page+' de '+totalPages()"></span>
  </div>

  <div class="bw-grid-pokemon">
    <template x-if="loading"><div class="bw-state"><div class="bw-spinner"></div>Carregando…</div></template>
    <template x-if="!loading && _items.length===0"><div class="bw-state"><i class="fa-regular fa-circle-xmark" style="font-size:24px;margin-bottom:8px"></i><br>Nenhum Pokémon encontrado.</div></template>
    <template x-for="p in paged()" :key="p.id">
      <div class="bw-pcard" @click="open(p)">
        <div class="bw-pcard-img">
          <template x-if="p.artwork_normal"><img :src="p.artwork_normal" :alt="p.name" loading="lazy"></template>
          <template x-if="!p.artwork_normal"><div class="bw-pcard-ph"><i class="fa-solid fa-circle-question"></i></div></template>
        </div>
        <div class="bw-pcard-body">
          <div class="bw-pcard-num" x-text="formatDexId(p.pokeapi_id)"></div>
          <div class="bw-pcard-name" x-text="p.name"></div>
          <div style="display:flex;gap:4px;flex-wrap:wrap">
            <span class="bw-badge" :style="typeBadgeStyle(p.type1)" x-text="p.type1"></span>
            <template x-if="p.type2"><span class="bw-badge" :style="typeBadgeStyle(p.type2)" x-text="p.type2"></span></template>
          </div>
        </div>
      </div>
    </template>
  </div>

  <div class="bw-pager" x-show="totalPages()>1">
    <button class="bw-pager-btn" :disabled="_page<=1" @click="goTo(_page-1)"><i class="fa-solid fa-chevron-left"></i></button>
    <template x-for="(p,i) in paginationPages()" :key="i">
      <template x-if="p==='…'"><div class="bw-pager-ellipsis">…</div></template>
      <template x-if="p!=='…'"><button class="bw-pager-btn" :class="{active:_page===p}" @click="goTo(p)" x-text="p"></button></template>
    </template>
    <template x-if="totalPages()>7"><input class="bw-pager-input" type="number" min="1" :max="totalPages()" placeholder="ir…" @keydown.enter="jumpTo($event)"></template>
    <button class="bw-pager-btn" :disabled="_page>=totalPages()" @click="goTo(_page+1)"><i class="fa-solid fa-chevron-right"></i></button>
  </div>
</div>
