<div style="display:flex;flex-direction:column;gap:18px;max-width:680px">
  <div style="background:var(--row);border-radius:14px;padding:24px 22px;border:var(--border)">
    <div style="font-size:24px;font-weight:800;color:var(--color);letter-spacing:-.02em;margin-bottom:6px">
      <i class="fa-solid fa-leaf" style="margin-right:8px"></i>BulbaWiki
    </div>
    <div style="font-size:13px;line-height:1.7;opacity:.75">
      A enciclopédia do <strong>BulbaRPG</strong> — consulte Pokémon, moves, habilidades e itens do nosso universo.
    </div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px">
    <button onclick="goTo('/pokemon')" class="bw-home-card">
      <i class="fa-solid fa-leaf fa-2x" style="color:var(--color)"></i>
      <span>Pokémon</span>
    </button>
    <button onclick="goTo('/moves')" class="bw-home-card">
      <i class="fa-solid fa-bolt fa-2x" style="color:var(--color)"></i>
      <span>Moves</span>
    </button>
    <button onclick="goTo('/abilities')" class="bw-home-card">
      <i class="fa-solid fa-shield-halved fa-2x" style="color:var(--color)"></i>
      <span>Habilidades</span>
    </button>
    <button onclick="goTo('/items')" class="bw-home-card">
      <i class="fa-solid fa-bag-shopping fa-2x" style="color:var(--color)"></i>
      <span>Itens</span>
    </button>
  </div>
  <div style="font-size:11px;opacity:.4;text-align:center">BulbaWiki · dados em tempo real · bulbarpg.forumeiros.com</div>
</div>
